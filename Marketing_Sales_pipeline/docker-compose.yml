version: '3.8'

services:

  minio:

    image: minio/minio

    container_name: marketing-minio

    restart: unless-stopped

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data

  postgres:

    image: postgres:16

    container_name: marketing-postgres

    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing123
      POSTGRES_DB: marketing_dw

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  minio_data:

  postgres_data: